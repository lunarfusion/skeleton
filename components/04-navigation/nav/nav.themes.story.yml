name: Navigation themes

props:

  items:
    - title: "Level Zero"
      url: 'http://wikipedia.com'

    - title: "Level Zero Active Trail"
      url: 'http://wikipedia.com'
      in_active_trail: true

      below:
        - title: "Level One Active Trail"
          url: 'http://wikipedia.com'
          in_active_trail: true

          below:
            - title: "Level Two Active Trail"
              url: 'http://wikipedia.com'
              in_active_trail: true

        - title: "Level One Active Trail"
          url: 'http://wikipedia.com'
          in_active_trail: true
          below:
            - title: "Level Two"
              url: 'http://wikipedia.com'
              in_active_trail: false

    - title: "Level Zero"
      url: 'http://wikipedia.com'

      below:
      - title: "Level One"
        url: 'http://wikipedia.com'

        below:
          - title: "Level Two"
            url: 'http://wikipedia.com'

          - title: "Level Two"
            url: 'http://wikipedia.com'

      - title: "Level One"
        url: 'http://wikipedia.com'

        below:
          - title: "Level Two"
            url: 'http://wikipedia.com'

          - title: "Level Two"
            url: 'http://wikipedia.com'

library_wrapper: >
  {% set themes = [
    'theme-default',
    'theme-primary',
  ] %}
  {% for theme in themes %}
  <div class="ui-patterns__story-variant">
    {% set theme_props = {'#props': _story['#props']|merge({'attributes': create_attribute({
      class: ['nav nav--' ~ theme]
    })})} %}
    <h4 class="title title--micro">{{ theme }}</h4>
    {% set theme_story = _story %}
    {{ theme_story|merge(theme_props) }}
    </div>
  {% endfor %}
