name: Download
description: A file that can be downloaded with an icon which can be customized for the file type.
group: "Molecules"
status: experimental
links:
   - "https://github.com/lunarfusion/skeleton"

variants:
  default:
    title: Default file
  pdf:
    title: PDF file
  zip:
    title: ZIP file
  image:
    title: Image file

props:
  theme:
    title: Theme
    type: string
    description: 'Color theme for the download.'
    enum:
      - theme-default
      - theme-primary
    default: theme-default

slots:
  file:
    title: File link
